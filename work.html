<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | Work</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Menu identique sur toutes les pages */
        header { 
            position: absolute; 
            top: 0; left: 0; width: 100%;
            text-align: center; 
            padding: 40px 0; 
            z-index: 999; 
        }
        .glitch { font-family: 'Syne', sans-serif; font-size: 5em; font-weight: 800; text-transform: uppercase; cursor: pointer; margin: 0 0 10px 0; color: #fff; }
        .glitch:hover { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { color: #fff; text-shadow: 2px 0 red; } 50% { color: #fff; text-shadow: -2px 0 cyan; } 100% { color: #fff; text-shadow: 2px 0 red; } }
        
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 1.2rem; transition: 0.3s; font-family: 'Syne', sans-serif; }
        nav a:hover { color: #ff0000; }

        /* Conteneur global centré verticalement */
        .work-wrapper {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Structure triple-player XXL */
        .slider-viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 2400px; /* Taille maximale accrue pour contenir les bords */
            gap: 40px;
            position: relative;
        }

        .video-box {
            aspect-ratio: 16 / 9;
            background: #000;
            transition: opacity 0.4s ease;
        }

        /* Taille doublée pour le player principal */
        .video-box.main {
            width: 55%; 
            opacity: 1;
            z-index: 5;
        }

        /* Aperçus latéraux grisés */
        .video-box.side {
            width: 15%; 
            opacity: 0.15; /* Effet grisé */
            pointer-events: none; /* Désactive les clics sur les côtés */
            z-index: 1;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Flèches de navigation */
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: none;
            font-size: 4rem;
            padding: 20px 30px;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }
        .slide-btn:hover { color: #ff0000; background: rgba(0, 0, 0, 0.9); }
        .prev-video { left: 20%; }
        .next-video { right: 20%; }

        @media (max-width: 1024px) {
            .video-box.main { width: 85%; }
            .video-box.side { display: none; }
            .prev-video { left: 10px; }
            .next-video { right: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="glitch" onclick="window.location.href='index.html'">PORTFOLIO</h1>
        <nav>
            <a href="index.html">STILLS</a>
            <a href="work.html" style="color:gray;">WORK</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <div class="work-wrapper">
        <button class="slide-btn prev-video" onclick="moveVideo(-1)">&#10094;</button>
        
        <div class="slider-viewport">
            <div class="video-box side">
                <iframe id="video-left" src=""></iframe>
            </div>
            
            <div class="video-box main">
                <iframe id="video-player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            
            <div class="video-box side">
                <iframe id="video-right" src=""></iframe>
            </div>
        </div>
        
        <button class="slide-btn next-video" onclick="moveVideo(1)">&#10095;</button>
    </div>

    <script>
        const vimeoVideos = [
            "https://player.vimeo.com/video/1208359041", 
            "https://player.vimeo.com/video/1208359948", 
            "https://player.vimeo.com/video/1208359248", 
            "https://player.vimeo.com/video/1208359340", 
            "https://player.vimeo.com/video/1208359283"
        ];

        let currentVideoIndex = 0;

        function updateSlider() {
            const leftIndex = (currentVideoIndex - 1 + vimeoVideos.length) % vimeoVideos.length;
            const rightIndex = (currentVideoIndex + 1) % vimeoVideos.length;

            document.getElementById('video-player').src = vimeoVideos[currentVideoIndex];
            document.getElementById('video-left').src = vimeoVideos[leftIndex];
            document.getElementById('video-right').src = vimeoVideos[rightIndex];
        }

        function moveVideo(direction) {
            currentVideoIndex = (currentVideoIndex + direction + vimeoVideos.length) % vimeoVideos.length;
            updateSlider();
        }

        // Initialisation au chargement de la page
        window.onload = updateSlider;
    </script>

</body>
</html>
