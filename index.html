    <style>
        body {
            margin: 0;
            background-color: #000000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 140px 20px 80px;
        }
        
        header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 5.5em; 
            letter-spacing: -3px; 
            text-transform: uppercase;
            margin: 0;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 40%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GRILLE DE LA MOSAÏQUE --- */
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 250px;
            grid-auto-flow: dense;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto 100px auto;
        }

        .mosaic-item {
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .mosaic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .mosaic-item:hover {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }

        .shape-1-1 { grid-column: span 1; grid-row: span 1; } 
        .shape-4-5 { grid-column: span 1; grid-row: span 2; } 
        .shape-16-9 { grid-column: span 2; grid-row: span 1; } 
        .shape-9-16 { grid-column: span 1; grid-row: span 2; } 

        /* --- ÉLÉMENTS VIDÉOS --- */
        .video-block {
            grid-column: 1 / -1; 
            grid-row: span 3; 
            margin: 80px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .video-container {
            width: 100%;
            max-width: 960px; 
            box-shadow: 0 0 50px rgba(255,255,255,0.05);
            transition: transform 0.5s ease, opacity 0.5s ease;
            opacity: 0.4; 
            transform: scale(0.95);
        }
        .video-container.is-active {
            opacity: 1;
            transform: scale(1);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            margin-top: 15px;
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666666;
            text-align: center;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 3em; letter-spacing: -1px; }
            .shape-16-9 { grid-column: span 1; grid-row: span 1; }
            .shape-4-5, .shape-9-16 { grid-row: span 1; }
            .video-block { grid-row: span 1; margin: 40px 0; }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoBlocks = document.querySelectorAll('.video-block');
            const observerOptions = {
                root: null,
                rootMargin: '-25% 0px -25% 0px',
                threshold: 0.4
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const container = entry.target.querySelector('.video-container');
                    const iframe = entry.target.querySelector('iframe');
                    if (!iframe) return;
                    
                    const player = new Vimeo.Player(iframe);

                    if (entry.isIntersecting) {
                        container.classList.add('is-active');
                        player.play().catch(error => {
                            console.log("Lecture en attente d'interaction.");
                        });
                    } else {
                        container.classList.remove('is-active');
                        player.pause().catch(error => {});
                    }
                });
            }, observerOptions);

            videoBlocks.forEach(block => observer.observe(block));
        });
    </script>
