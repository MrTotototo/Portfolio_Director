<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Réalisateur</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        
        /* Animation Glitch */
        .glitch { font-size: 5em; text-transform: uppercase; position: relative; text-align: center; margin: 100px 0; cursor: pointer; }
        .glitch:hover::before { content: "PORTFOLIO"; position: absolute; left: -2px; text-shadow: 2px 0 red; clip: rect(24px, 550px, 90px, 0); animation: glitch 2s infinite linear alternate-reverse; }
        @keyframes glitch { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            grid-auto-rows: 400px;
            gap: 20px; padding: 20px;
        }
        .item { overflow: hidden; transition: 0.4s; }
        .item:hover { transform: scale(1.08); z-index: 2; }
        .item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .video-item { grid-column: span 2; grid-row: span 2; background: #000; }
        .video-item iframe { width: 100%; height: 100%; border: none; }

        #lightbox { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 80%; max-height: 80%; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 3em; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <h1 class="glitch">Portfolio</h1>
    <nav style="text-align: center; margin-bottom: 50px;"><a href="contact.html" style="color:white; text-decoration:none;">CONTACT</a></nav>

    <div class="mosaic-grid" id="grid"></div>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <button class="nav-btn" style="left:20px;" onclick="changeImg(-1)">&#10094;</button>
        <img id="lb-img" src="">
        <button class="nav-btn" style="right:20px;" onclick="changeImg(1)">&#10095;</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        let files = []; // À remplir avec tes 39 noms de fichiers exacts
        for(let i=1; i<=39; i++) files.push(i + '.jpg'); 
        files.sort(() => Math.random() - 0.5); // Mélange aléatoire
        
        files.forEach((f, index) => {
            if(index % 8 === 0) grid.innerHTML += `<div class="video-item"><iframe src="https://player.vimeo.com/video/1208359041"></iframe></div>`;
            grid.innerHTML += `<div class="item"><img src="${f}" onclick="openLB(${index})"></div>`;
        });

        let current = 0;
        function openLB(idx) { current = idx; document.getElementById('lb-img').src = files[idx]; document.getElementById('lightbox').classList.add('active'); }
        function changeImg(n) { current = (current + n + files.length) % files.length; document.getElementById('lb-img').src = files[current]; }
    </script>
</body>
</html>
