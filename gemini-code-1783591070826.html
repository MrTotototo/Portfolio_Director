    <style>
        body {
            margin: 0;
            background-color: #000000; /* Fond noir absolu */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 120px 20px 60px;
        }
        header h1 {
            font-size: 2.5em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 300;
        }

        /* --- GRILLE DE LA MOSAÏQUE --- */
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 250px;
            grid-auto-flow: dense;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto 100px auto;
        }

        /* --- ÉLÉMENTS PHOTOS --- */
        .mosaic-item {
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .mosaic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Effet de zoom sur les photos au survol */
        .mosaic-item:hover {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }

        /* Formats de recadrage des photos */
        .shape-1-1 { grid-column: span 1; grid-row: span 1; } /* Carré */
        .shape-4-5 { grid-column: span 1; grid-row: span 2; } /* Portrait */
        .shape-16-9 { grid-column: span 2; grid-row: span 1; } /* Paysage */
        .shape-9-16 { grid-column: span 1; grid-row: span 2; } /* Vertical */

        /* --- ÉLÉMENTS VIDÉOS (ESPACÉS) --- */
        /* La vidéo prend toute la largeur de la grille pour casser le rythme et s'isoler */
        .video-block {
            grid-column: 1 / -1; 
            grid-row: span 3; /* Donne de la hauteur à la section vidéo */
            margin: 80px 0; /* Crée de grands espaces au-dessus/en-dessous */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Taille du lecteur vidéo centré */
        .video-container {
            width: 100%;
            max-width: 960px; /* Taille cinéma parfaite au centre */
            box-shadow: 0 0 50px rgba(255,255,255,0.05);
            transition: transform 0.5s ease, opacity 0.5s ease;
            opacity: 0.4; /* Légèrement transparent quand pas centré */
            transform: scale(0.95);
        }

        /* Classe activée en JS quand la vidéo est parfaitement centrée au scroll */
        .video-container.is-active {
            opacity: 1;
            transform: scale(1);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            margin-top: 15px;
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666666;
            text-align: center;
        }

        /* Ajustements mobiles */
        @media (max-width: 768px) {
            .shape-16-9 { grid-column: span 1; grid-row: span 1; }
            .shape-4-5, .shape-9-16 { grid-row: span 1; }
            .video-block { grid-row: span 1; margin: 40px 0; }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoBlocks = document.querySelectorAll('.video-block');

            // Config de détection : Déclenche quand l'élément occupe le centre de l'écran
            const observerOptions = {
                root: null,
                rootMargin: '-25% 0px -25% 0px', /* Zone de focus au milieu de l'écran */
                threshold: 0.4 /* La vidéo doit être visible à au moins 40% dans cette zone */
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const container = entry.target.querySelector('.video-container');
                    const iframe = entry.target.querySelector('iframe');
                    if (!iframe) return;
                    
                    // On initialise le contrôleur Vimeo pour cet iframe
                    const player = new Vimeo.Player(iframe);

                    if (entry.isIntersecting) {
                        // La vidéo entre au milieu de l'écran
                        container.classList.add('is-active');
                        player.play().catch(error => {
                            console.log("Lecture auto bloquée ou en attente d'interaction utilisateur.");
                        });
                    } else {
                        // La vidéo sort du milieu de l'écran
                        container.classList.remove('is-active');
                        player.pause().catch(error => {});
                    }
                });
            }, observerOptions);

            // On demande au script de surveiller chaque bloc vidéo
            videoBlocks.forEach(block => observer.observe(block));
        });
    </script>
