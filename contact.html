<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: sans-serif;
            background: #000;
            overflow: hidden; /* Empêche de scroller */
        }
        
        header { 
            position: absolute; /* Fixe le menu par-dessus la vidéo */
            top: 0; left: 0; width: 100%;
            text-align: center; 
            padding: 40px 0; 
            z-index: 10; 
        }
        .glitch { font-family: 'Syne', sans-serif; font-size: 5em; font-weight: 800; text-transform: uppercase; cursor: pointer; margin: 0 0 10px 0; color: #fff;}
        .glitch:hover { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { color: #fff; text-shadow: 2px 0 red; } 50% { color: #fff; text-shadow: -2px 0 cyan; } 100% { color: #fff; text-shadow: 2px 0 red; } }
        
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 1.2rem; transition: 0.3s; font-family: 'Syne', sans-serif;}
        nav a:hover { color: #ff0000; }

        /* Vidéo de fond */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit l'écran, va couper un peu le haut/bas sur PC */
            z-index: 0;
            filter: brightness(0.4); /* Assombrit la vidéo pour que le mail reste lisible */
        }

        /* Conteneur de l'email centré */
        .contact-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-content a {
            color: #fff;
            font-size: 3rem;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .contact-content a:hover {
            color: #ff0000;
        }
        
        @media (max-width: 768px) {
            .contact-content a { font-size: 1.5rem; }
            .glitch { font-size: 3em; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="bg-video">
        <source src="video_contact.mp4" type="video/mp4">
    </video>

    <header>
        <h1 class="glitch" onclick="window.location.href='index.html'">PORTFOLIO</h1>
        <nav>
            <a href="index.html">PHOTOS</a>
            <a href="work.html">WORK</a>
            <a href="contact.html" style="color:gray;">CONTACT</a>
        </nav>
    </header>

    <div class="contact-content">
        <a href="mailto:thomassavaryprod@gmail.com">thomassavaryprod@gmail.com</a>
    </div>

</body>
</html>
